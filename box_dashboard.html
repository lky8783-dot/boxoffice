<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>박스오피스 순위 — 오늘 영화 관객수 TOP 10</title>
<meta name="description" content="오늘 박스오피스 순위, 일별·주간 관객수 TOP 10. KOBIS 공식 데이터 기반 매일 자동 업데이트.">
<style>
  :root {
    --bg:     #0d1117;
    --card:   #161b22;
    --border: #21262d;
    --text:   #e6edf3;
    --sub:    #8b949e;
    --muted:  #484f58;
    --accent: #58a6ff;
    --gold:   #ffd700;
    --silver: #c0c0c0;
    --bronze: #cd7f32;
    --green:  #3fb950;
    --red:    #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Malgun Gothic', sans-serif; }

  /* ── SEO 숨김 텍스트 (화면엔 안 보이고 검색엔진은 읽음) ── */
  .seo-hidden {
    position: absolute; width: 1px; height: 1px;
    overflow: hidden; clip: rect(0,0,0,0);
    white-space: nowrap; pointer-events: none;
  }

  /* ── 헤더 ── */
  .header {
    background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 0;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .header-title { display: flex; align-items: center; gap: 10px; }
  .header-title h1 { font-size: 1.2rem; font-weight: 700; }
  .header-meta { font-size: 0.72rem; color: var(--muted); }

  /* ── 탭 ── */
  .tabs { display: flex; }
  .tab-btn {
    padding: 8px 20px; background: transparent; border: none;
    border-bottom: 2px solid transparent;
    color: var(--sub); font-size: 0.88rem; font-weight: 600;
    cursor: pointer; transition: color .15s, border-color .15s;
  }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }

  /* ── 날짜 배너 ── */
  .date-banner {
    padding: 10px 16px; background: var(--card); border-bottom: 1px solid var(--border);
    font-size: 0.78rem; color: var(--sub);
  }
  .date-banner strong { color: var(--text); }

  /* ── 탭 패널 ── */
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* ── 카드 그리드 ── */
  .movies-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 10px; padding: 14px;
  }

  /* ── 영화 카드 ── */
  .movie-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; display: flex;
    cursor: pointer;
    transition: border-color .15s, transform .15s, box-shadow .15s;
  }
  .movie-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(88,166,255,.1); }
  .movie-card.rank-top { border-color: #2a2118; }
  .movie-card.rank-top:hover { border-color: var(--gold); box-shadow: 0 4px 20px rgba(255,215,0,.1); }

  /* ── 포스터 ── */
  .mc-poster { flex-shrink: 0; width: 80px; position: relative; overflow: hidden; background: #1c2128; }
  .mc-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .mc-poster-placeholder {
    width: 100%; height: 100%; min-height: 140px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; color: var(--muted);
  }
  .mc-rank-overlay {
    position: absolute; top: 6px; left: 6px; width: 26px; height: 26px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.78rem; font-weight: 900; backdrop-filter: blur(4px);
  }
  .mc-rank-overlay.r1 { background: rgba(74,57,0,.85);  color: var(--gold);   border: 1px solid rgba(90,74,16,.8); }
  .mc-rank-overlay.r2 { background: rgba(42,47,53,.85); color: var(--silver); border: 1px solid rgba(58,69,80,.8); }
  .mc-rank-overlay.r3 { background: rgba(58,32,16,.85); color: var(--bronze); border: 1px solid rgba(90,48,32,.8); }
  .mc-rank-overlay.rn { background: rgba(13,17,23,.85); color: var(--sub);    border: 1px solid rgba(33,38,45,.8); }

  /* ── 영화 정보 ── */
  .mc-info { flex: 1; min-width: 0; padding: 12px 12px 10px; display: flex; flex-direction: column; gap: 7px; }
  .mc-title-row { display: flex; align-items: center; gap: 6px; }
  .mc-title {
    font-size: 0.95rem; font-weight: 700; color: var(--text); line-height: 1.35;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0;
  }
  .mc-change {
    display: inline-flex; align-items: center; flex-shrink: 0;
    font-size: 0.65rem; font-weight: 700;
    padding: 2px 5px; border-radius: 4px; white-space: nowrap;
  }
  .mc-change.up   { background: #1a3320; color: var(--green); }
  .mc-change.down { background: #2d1414; color: var(--red); }
  .mc-change.same { background: #1c2128; color: var(--muted); }
  .mc-change.new  { background: #0d2a4a; color: var(--accent); }

  /* ── 점유율 바 ── */
  .mc-bar-bg { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .mc-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), #1f6feb); }
  .mc-bar-label { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }

  /* ── 수치 그리드 ── */
  .mc-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 8px; }
  .mc-stat { display: flex; flex-direction: column; }
  .mc-stat-val { font-size: 0.82rem; font-weight: 700; color: var(--text); }
  .mc-stat-val.accent { color: var(--accent); }
  .mc-stat-val.gold   { color: var(--gold); font-size: 0.78rem; }
  .mc-stat-lbl { font-size: 0.6rem; color: var(--muted); margin-top: 1px; }

  /* ── 하단 메타 ── */
  .mc-meta { display: flex; gap: 8px; font-size: 0.63rem; color: var(--muted); flex-wrap: wrap; border-top: 1px solid var(--border); padding-top: 6px; }

  /* ────────────────── 모달 ────────────────── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,.75); backdrop-filter: blur(4px);
    align-items: center; justify-content: center; padding: 16px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; width: 100%; max-width: 520px;
    max-height: 90vh; overflow-y: auto;
    animation: modalIn .2s ease;
  }
  @keyframes modalIn { from { opacity:0; transform:scale(.96) translateY(8px); } to { opacity:1; transform:none; } }

  .modal-header {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 16px 16px 14px; border-bottom: 1px solid var(--border);
  }
  .modal-poster { flex-shrink: 0; width: 90px; border-radius: 8px; overflow: hidden; background: #1c2128; position: relative; }
  .modal-poster img { width: 100%; display: block; }
  .modal-poster-ph { width: 100%; height: 130px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--muted); }
  .modal-poster .mc-rank-overlay { top: 6px; left: 6px; }

  .modal-title-block { flex: 1; min-width: 0; }
  .modal-title { font-size: 1.05rem; font-weight: 700; line-height: 1.4; margin-bottom: 6px; word-break: keep-all; }
  .modal-sub { font-size: 0.72rem; color: var(--sub); display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .modal-close {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
    background: #21262d; border: none; color: var(--sub); font-size: 1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .modal-close:hover { background: #30363d; color: var(--text); }

  .modal-body { padding: 14px 16px 18px; display: flex; flex-direction: column; gap: 14px; }

  /* 모달 점유율 바 */
  .modal-bar-wrap { }
  .modal-bar-label { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--sub); margin-bottom: 4px; }
  .modal-bar-bg { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .modal-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), #1f6feb); }

  /* 모달 수치 그리드 */
  .modal-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-stat { background: #1c2128; border-radius: 8px; padding: 10px 12px; }
  .modal-stat-val { font-size: 1rem; font-weight: 700; color: var(--text); }
  .modal-stat-val.accent { color: var(--accent); }
  .modal-stat-val.gold   { color: var(--gold); }
  .modal-stat-lbl { font-size: 0.65rem; color: var(--muted); margin-top: 3px; }
  .modal-stat-change { font-size: 0.68rem; margin-top: 2px; }
  .modal-stat-change.up   { color: var(--green); }
  .modal-stat-change.down { color: var(--red); }
  .modal-stat-change.same { color: var(--muted); }

  /* 모달 하단 메타 */
  .modal-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .modal-meta-item { font-size: 0.72rem; color: var(--sub); }
  .modal-meta-item strong { color: var(--text); }

  .modal-section-title { font-size: 0.7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }

  /* ── 기타 ── */
  .msg { padding: 50px; text-align: center; color: var(--muted); font-size: 0.9rem; }

  @media (max-width: 480px) {
    .movies-grid { grid-template-columns: 1fr; padding: 8px; gap: 8px; }
    .mc-poster { width: 70px; }
    .modal-stats { grid-template-columns: 1fr 1fr; }
    .modal { max-height: 85vh; }
  }
</style>
</head>
<body>

<!-- SEO 숨김 키워드 (JS가 매일 갱신) -->
<div id="seo-keywords" class="seo-hidden" aria-hidden="true"></div>

<div class="header">
  <div class="header-top">
    <div class="header-title">
      <span style="font-size:1.4rem">🎬</span>
      <h1>박스오피스</h1>
    </div>
    <span class="header-meta" id="updated-time">-</span>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="daily">일별</button>
    <button class="tab-btn"        data-tab="weekly">주간</button>
  </div>
</div>

<div id="pane-daily"  class="tab-pane active"></div>
<div id="pane-weekly" class="tab-pane"></div>

<!-- 모달 -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <div class="modal-poster" id="modal-poster"></div>
      <div class="modal-title-block">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-sub"  id="modal-sub"></div>
        <div id="modal-bar-wrap" class="modal-bar-wrap"></div>
      </div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <div class="modal-section-title">관객 · 매출</div>
        <div class="modal-stats" id="modal-stats"></div>
      </div>
      <div>
        <div class="modal-section-title">상영 정보</div>
        <div class="modal-meta" id="modal-meta"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── 전역 데이터 ──────────────────────────────────────────────────────────────
let _allMovies = [];

async function loadData() {
  try {
    const r = await fetch('box_data.json?t=' + Date.now());
    if (!r.ok) throw new Error(r.status);
    return await r.json();
  } catch(e) { return null; }
}

// ── 포맷 ─────────────────────────────────────────────────────────────────────
function fmtAudi(n) {
  const v = Number(n);
  if (!v) return '-';
  if (v >= 10000000) return (v / 10000000).toFixed(1) + '천만명';
  if (v >= 1000000)  return Math.round(v / 10000) + '만명';
  if (v >= 10000)    return (v / 10000).toFixed(1) + '만명';
  return v.toLocaleString() + '명';
}
function fmtSales(n) {
  const v = Number(n);
  if (!v) return '-';
  if (v >= 100000000000) return (v / 100000000000).toFixed(1) + '천억원';
  if (v >= 10000000000)  return (v / 100000000).toFixed(0) + '억원';
  if (v >= 1000000000)   return (v / 100000000).toFixed(1) + '억원';
  if (v >= 100000000)    return (v / 100000000).toFixed(1) + '억원';
  if (v >= 10000000)     return (v / 10000000).toFixed(1) + '천만원';
  return v.toLocaleString() + '원';
}
function fmtDate(s) {
  if (!s || s.length < 8) return s || '-';
  return `${s.slice(0,4)}.${s.slice(4,6)}.${s.slice(6,8)}`;
}
function fmtBannerDate(s) {
  if (!s || s.length < 8) return s || '';
  return `${s.slice(0,4)}년 ${parseInt(s.slice(4,6))}월 ${parseInt(s.slice(6,8))}일`;
}
function fmtChange(val, pct, unit='명') {
  const n = Number(val);
  if (!n) return '<span class="modal-stat-change same">전일 동일</span>';
  const sign = n > 0 ? '+' : '';
  const cls  = n > 0 ? 'up' : 'down';
  const p    = pct ? ` (${Number(pct) > 0 ? '+' : ''}${parseFloat(pct).toFixed(1)}%)` : '';
  return `<div class="modal-stat-change ${cls}">${sign}${Math.abs(n).toLocaleString()}${unit}${p}</div>`;
}

// ── 배지 ─────────────────────────────────────────────────────────────────────
function changeBadge(inten, isNew) {
  if (isNew === 'NEW') return `<span class="mc-change new">NEW</span>`;
  const n = Number(inten);
  if (n > 0)  return `<span class="mc-change up">▲${n}</span>`;
  if (n < 0)  return `<span class="mc-change down">▼${Math.abs(n)}</span>`;
  return `<span class="mc-change same">–</span>`;
}
function rankClass(r) {
  if (r === '1') return 'r1';
  if (r === '2') return 'r2';
  if (r === '3') return 'r3';
  return 'rn';
}

// ── 카드 HTML ─────────────────────────────────────────────────────────────────
function movieCardHTML(m, maxShare, idx) {
  const rank   = m.rank || m.rnum;
  const share  = parseFloat(m.salesShare) || 0;
  const barPct = maxShare > 0 ? (share / maxShare * 100).toFixed(1) : 0;
  const rc     = rankClass(rank);
  const isTop  = ['1','2','3'].includes(rank);

  const posterHTML = m.poster_url
    ? `<img src="${m.poster_url}" alt="${m.movieNm}" loading="lazy"
            onerror="this.parentElement.innerHTML='<div class=mc-poster-placeholder>🎬</div>'">`
    : `<div class="mc-poster-placeholder">🎬</div>`;

  return `
  <div class="movie-card ${isTop ? 'rank-top' : ''}" onclick="openModal(${idx})">
    <div class="mc-poster">
      ${posterHTML}
      <div class="mc-rank-overlay ${rc}">${rank}</div>
    </div>
    <div class="mc-info">
      <div class="mc-title-row">
        <span class="mc-title" title="${m.movieNm}">${m.movieNm}</span>
        ${changeBadge(m.rankInten, m.rankOldAndNew)}
      </div>
      <div>
        <div class="mc-bar-bg"><div class="mc-bar-fill" style="width:${barPct}%"></div></div>
        <div class="mc-bar-label">매출 점유율 ${share}%</div>
      </div>
      <div class="mc-stats">
        <div class="mc-stat">
          <span class="mc-stat-val accent">${fmtAudi(m.audiCnt)}</span>
          <span class="mc-stat-lbl">오늘 관객</span>
        </div>
        <div class="mc-stat">
          <span class="mc-stat-val">${fmtAudi(m.audiAcc)}</span>
          <span class="mc-stat-lbl">누적 관객</span>
        </div>
        <div class="mc-stat">
          <span class="mc-stat-val">${fmtSales(m.salesAmt)}</span>
          <span class="mc-stat-lbl">오늘 매출</span>
        </div>
        <div class="mc-stat">
          <span class="mc-stat-val gold">${fmtSales(m.salesAcc)}</span>
          <span class="mc-stat-lbl">누적 매출</span>
        </div>
      </div>
      <div class="mc-meta">
        <span>${fmtDate(m.openDt)}</span>
        <span>🎦 ${Number(m.scrnCnt).toLocaleString()}스크린</span>
        <span>▶ ${Number(m.showCnt).toLocaleString()}회</span>
      </div>
    </div>
  </div>`;
}

// ── 모달 ─────────────────────────────────────────────────────────────────────
function openModal(idx) {
  const m  = _allMovies[idx];
  if (!m) return;
  const rank = m.rank || m.rnum;
  const rc   = rankClass(rank);

  // 포스터
  const posterEl = document.getElementById('modal-poster');
  posterEl.innerHTML = (m.poster_url
    ? `<img src="${m.poster_url}" alt="${m.movieNm}"
           onerror="this.parentElement.innerHTML='<div class=modal-poster-ph>🎬</div>'">`
    : `<div class="modal-poster-ph">🎬</div>`)
    + `<div class="mc-rank-overlay ${rc}">${rank}</div>`;

  // 제목
  document.getElementById('modal-title').textContent = m.movieNm;

  // 서브 (변동 배지 + 상태)
  const isNew = m.rankOldAndNew === 'NEW';
  const inten = Number(m.rankInten);
  let changeText = isNew ? '<span class="mc-change new">NEW</span>'
    : inten > 0 ? `<span class="mc-change up">▲${inten} 상승</span>`
    : inten < 0 ? `<span class="mc-change down">▼${Math.abs(inten)} 하락</span>`
    : `<span class="mc-change same">순위 유지</span>`;
  document.getElementById('modal-sub').innerHTML = changeText;

  // 점유율 바
  const share = parseFloat(m.salesShare) || 0;
  document.getElementById('modal-bar-wrap').innerHTML = `
    <div class="modal-bar-label">
      <span>매출 점유율</span><span><strong style="color:var(--text)">${share}%</strong></span>
    </div>
    <div class="modal-bar-bg"><div class="modal-bar-fill" style="width:${share}%"></div></div>`;

  // 관객·매출 수치
  document.getElementById('modal-stats').innerHTML = `
    <div class="modal-stat">
      <div class="modal-stat-val accent">${fmtAudi(m.audiCnt)}</div>
      <div class="modal-stat-lbl">오늘 관객</div>
      ${fmtChange(m.audiInten, m.audiChange)}
    </div>
    <div class="modal-stat">
      <div class="modal-stat-val">${fmtAudi(m.audiAcc)}</div>
      <div class="modal-stat-lbl">누적 관객</div>
    </div>
    <div class="modal-stat">
      <div class="modal-stat-val">${fmtSales(m.salesAmt)}</div>
      <div class="modal-stat-lbl">오늘 매출</div>
      ${fmtChange(m.salesInten, m.salesChange, '원')}
    </div>
    <div class="modal-stat">
      <div class="modal-stat-val gold">${fmtSales(m.salesAcc)}</div>
      <div class="modal-stat-lbl">누적 매출</div>
    </div>`;

  // 상영 정보
  document.getElementById('modal-meta').innerHTML = `
    <div class="modal-meta-item">개봉일 <strong>${fmtDate(m.openDt)}</strong></div>
    <div class="modal-meta-item">스크린 <strong>${Number(m.scrnCnt).toLocaleString()}개</strong></div>
    <div class="modal-meta-item">상영횟수 <strong>${Number(m.showCnt).toLocaleString()}회</strong></div>
    <div class="modal-meta-item">매출비중 <strong>${share}%</strong></div>`;

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── SEO 키워드 (매일 데이터 기반으로 갱신) ──────────────────────────────────
function injectSEO(data) {
  const now   = new Date();
  const month = now.getMonth() + 1;
  const day   = now.getDate();
  const titles = [...(data.daily || []), ...(data.weekly || [])]
    .map(m => m.movieNm).filter((v, i, a) => a.indexOf(v) === i);

  const keywords = [
    `${month}월 ${day}일 박스오피스`,
    '오늘 박스오피스 순위',
    '오늘 영화 관객수',
    '주간 박스오피스 TOP10',
    '현재 상영 영화 순위',
    '박스오피스 1위',
    '한국 영화 순위',
    '영화 관객수 순위',
    '박스오피스 관객수',
    '오늘 영화 추천',
    ...titles.map(t => `${t} 관객수`),
    ...titles.map(t => `${t} 박스오피스`),
    ...(data.daily || []).slice(0,3).map(m => `${m.movieNm} 순위 ${m.rank}위`),
  ];
  document.getElementById('seo-keywords').textContent = keywords.join(', ');
}

// ── 렌더 ─────────────────────────────────────────────────────────────────────
function renderMovies(movies, paneId, dateStr, offset) {
  const pane = document.getElementById(paneId);
  if (!movies || movies.length === 0) {
    pane.innerHTML = '<div class="msg">데이터가 없습니다.</div>';
    return;
  }
  const maxShare = Math.max(...movies.map(m => parseFloat(m.salesShare) || 0));
  const banner   = `<div class="date-banner"><strong>${fmtBannerDate(dateStr)}</strong> 기준 박스오피스</div>`;
  const cards    = movies.map((m, i) => movieCardHTML(m, maxShare, offset + i)).join('');
  pane.innerHTML  = banner + `<div class="movies-grid">${cards}</div>`;
}

// ── 탭 ───────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('pane-' + btn.dataset.tab).classList.add('active');
  });
});

// ── 초기화 ───────────────────────────────────────────────────────────────────
async function init() {
  const data = await loadData();
  if (!data) {
    document.getElementById('pane-daily').innerHTML =
      '<div class="msg">box_data.json 을 찾을 수 없습니다.<br>python box_fetch.py 를 먼저 실행하세요.</div>';
    return;
  }

  // 업데이트 시간
  if (data.updated) {
    const d = new Date(data.updated);
    document.getElementById('updated-time').textContent =
      `업데이트 ${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  // 모달용 전역 배열: daily(0~9) + weekly(10~19)
  _allMovies = [...(data.daily || []), ...(data.weekly || [])];

  renderMovies(data.daily,  'pane-daily',  data.daily_date,  0);
  renderMovies(data.weekly, 'pane-weekly', data.weekly_date, (data.daily || []).length);

  injectSEO(data);
}
init();
</script>
