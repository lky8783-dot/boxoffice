<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>박스오피스 순위 — 오늘 영화 관객수 TOP 10</title>
<meta name="description" content="오늘 박스오피스 순위, 일별·주간 관객수 TOP 10. KOBIS 공식 데이터 기반 매일 자동 업데이트.">
<style>
  :root {
    --bg:     #0d1117;
    --card:   #161b22;
    --border: #21262d;
    --text:   #e6edf3;
    --sub:    #8b949e;
    --muted:  #484f58;
    --accent: #58a6ff;
    --gold:   #ffd700;
    --silver: #c0c0c0;
    --bronze: #cd7f32;
    --green:  #3fb950;
    --red:    #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Malgun Gothic', sans-serif; }

  .seo-hidden {
    position: absolute; width: 1px; height: 1px;
    overflow: hidden; clip: rect(0,0,0,0);
    white-space: nowrap; pointer-events: none;
  }

  /* ── 헤더 ── */
  .header {
    background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
    border-bottom: 1px solid var(--border); padding: 16px 20px 0;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .header-title { display: flex; align-items: center; gap: 10px; }
  .header-title h1 { font-size: 1.2rem; font-weight: 700; }
  .header-meta { font-size: 0.72rem; color: var(--muted); }

  .tabs { display: flex; }
  .tab-btn {
    padding: 8px 20px; background: transparent; border: none;
    border-bottom: 2px solid transparent;
    color: var(--sub); font-size: 0.88rem; font-weight: 600;
    cursor: pointer; transition: color .15s, border-color .15s;
  }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }

  .date-banner {
    padding: 10px 16px; background: var(--card); border-bottom: 1px solid var(--border);
    font-size: 0.78rem; color: var(--sub);
  }
  .date-banner strong { color: var(--text); }

  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* ── 카드 그리드 — 2열 고정 ── */
  .movies-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px; padding: 14px;
  }
  @media (max-width: 600px) {
    .movies-grid { grid-template-columns: 1fr; }
  }

  /* ── 영화 카드 ── */
  .movie-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; display: flex;
    cursor: pointer;
    transition: border-color .15s, transform .15s, box-shadow .15s;
  }
  .movie-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(88,166,255,.1); }
  .movie-card.rank-top { border-color: #2a2118; }
  .movie-card.rank-top:hover { border-color: var(--gold); box-shadow: 0 4px 20px rgba(255,215,0,.1); }

  /* ── 포스터 120px ── */
  .mc-poster { flex-shrink: 0; width: 120px; position: relative; overflow: hidden; background: #1c2128; }
  .mc-poster img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }
  .mc-poster-placeholder {
    width: 100%; height: 100%; min-height: 160px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; color: var(--muted); font-size: 0.7rem;
  }
  .mc-poster-placeholder span { font-size: 1.8rem; }
  .mc-rank-overlay {
    position: absolute; top: 6px; left: 6px; width: 28px; height: 28px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.82rem; font-weight: 900; backdrop-filter: blur(4px);
  }
  .mc-rank-overlay.r1 { background: rgba(74,57,0,.88);  color: var(--gold);   border: 1px solid rgba(90,74,16,.8); }
  .mc-rank-overlay.r2 { background: rgba(42,47,53,.88); color: var(--silver); border: 1px solid rgba(58,69,80,.8); }
  .mc-rank-overlay.r3 { background: rgba(58,32,16,.88); color: var(--bronze); border: 1px solid rgba(90,48,32,.8); }
  .mc-rank-overlay.rn { background: rgba(13,17,23,.88); color: var(--sub);    border: 1px solid rgba(33,38,45,.8); }

  /* ── 영화 정보 (텍스트 영역) ── */
  .mc-info { flex: 1; min-width: 0; padding: 11px 11px 9px; display: flex; flex-direction: column; gap: 6px; }
  .mc-title-row { display: flex; align-items: center; gap: 6px; }
  .mc-title {
    font-size: 0.92rem; font-weight: 700; color: var(--text); line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0;
  }
  .mc-change {
    display: inline-flex; align-items: center; flex-shrink: 0;
    font-size: 0.63rem; font-weight: 700;
    padding: 2px 5px; border-radius: 4px; white-space: nowrap;
  }
  .mc-change.up   { background: #1a3320; color: var(--green); }
  .mc-change.down { background: #2d1414; color: var(--red); }
  .mc-change.same { background: #1c2128; color: var(--muted); }
  .mc-change.new  { background: #0d2a4a; color: var(--accent); }

  .mc-bar-bg { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .mc-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), #1f6feb); }
  .mc-bar-label { font-size: 0.63rem; color: var(--muted); margin-top: 2px; }

  .mc-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 6px; }
  .mc-stat { display: flex; flex-direction: column; }
  .mc-stat-val { font-size: 0.8rem; font-weight: 700; color: var(--text); }
  .mc-stat-val.accent { color: var(--accent); }
  .mc-stat-val.gold   { color: var(--gold); font-size: 0.76rem; }
  .mc-stat-lbl { font-size: 0.58rem; color: var(--muted); margin-top: 1px; }

  /* ── 하단 메타: 개봉일 + 스크린/상영 ── */
  .mc-meta { border-top: 1px solid var(--border); padding-top: 6px; display: flex; flex-direction: column; gap: 3px; }
  .mc-meta-row { display: flex; gap: 8px; font-size: 0.62rem; color: var(--muted); }
  .mc-meta-row .val { color: var(--sub); }

  .msg { padding: 50px; text-align: center; color: var(--muted); font-size: 0.9rem; }

  /* ══════════════ 모달 ══════════════ */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,.78); backdrop-filter: blur(5px);
    align-items: center; justify-content: center; padding: 16px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; width: 100%; max-width: 540px;
    max-height: 90vh; overflow-y: auto;
    animation: modalIn .2s ease;
  }
  @keyframes modalIn { from { opacity:0; transform:scale(.95) translateY(10px); } to { opacity:1; transform:none; } }

  /* 모달 헤더 */
  .modal-header {
    display: flex; gap: 14px; padding: 16px; border-bottom: 1px solid var(--border);
  }
  .modal-poster-wrap {
    flex-shrink: 0; width: 100px; border-radius: 8px; overflow: hidden;
    background: #1c2128; position: relative;
  }
  .modal-poster-wrap img { width: 100%; display: block; object-fit: cover; }
  .modal-poster-ph {
    width: 100%; height: 145px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 4px;
    color: var(--muted); font-size: 0.65rem;
  }
  .modal-poster-ph span { font-size: 1.8rem; }
  .modal-poster-wrap .mc-rank-overlay { top: 6px; left: 6px; }

  .modal-title-block { flex: 1; min-width: 0; padding-top: 2px; }
  .modal-movie-title { font-size: 1.08rem; font-weight: 700; line-height: 1.4; margin-bottom: 4px; word-break: keep-all; }
  .modal-title-en { font-size: 0.72rem; color: var(--muted); margin-bottom: 8px; }
  .modal-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
  .modal-badge {
    font-size: 0.65rem; padding: 2px 7px; border-radius: 4px; font-weight: 600;
    background: #1c2128; color: var(--sub); border: 1px solid var(--border);
  }
  .modal-bar-wrap { margin-top: 6px; }
  .modal-bar-label { display: flex; justify-content: space-between; font-size: 0.68rem; color: var(--sub); margin-bottom: 3px; }
  .modal-bar-bg { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .modal-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), #1f6feb); }

  .modal-close {
    flex-shrink: 0; align-self: flex-start;
    width: 28px; height: 28px; border-radius: 50%;
    background: #21262d; border: none; color: var(--sub); font-size: 0.95rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .modal-close:hover { background: #30363d; color: var(--text); }

  /* 모달 본문 */
  .modal-body { padding: 14px 16px 18px; display: flex; flex-direction: column; gap: 14px; }

  .modal-section-title {
    font-size: 0.68rem; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .06em; margin-bottom: 7px;
  }

  /* 줄거리 */
  .modal-synopsis {
    font-size: 0.82rem; color: var(--sub); line-height: 1.65;
    word-break: keep-all;
  }

  /* 영화 정보 그리드 */
  .modal-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .modal-info-item { background: #1c2128; border-radius: 8px; padding: 9px 11px; }
  .modal-info-lbl { font-size: 0.6rem; color: var(--muted); margin-bottom: 3px; }
  .modal-info-val { font-size: 0.8rem; color: var(--text); font-weight: 600; line-height: 1.35; word-break: keep-all; }
  .modal-info-val.accent { color: var(--accent); }
  .modal-info-val.gold   { color: var(--gold); }

  /* 박스오피스 수치 (하단) */
  .modal-stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .modal-mini-stat { text-align: center; background: #1c2128; border-radius: 7px; padding: 7px 4px; }
  .modal-mini-val { font-size: 0.78rem; font-weight: 700; color: var(--text); }
  .modal-mini-val.accent { color: var(--accent); }
  .modal-mini-val.gold   { color: var(--gold); }
  .modal-mini-lbl { font-size: 0.58rem; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>

<div id="seo-keywords" class="seo-hidden" aria-hidden="true"></div>

<div class="header">
  <div class="header-top">
    <div class="header-title">
      <span style="font-size:1.4rem">🎬</span>
      <h1>박스오피스</h1>
    </div>
    <span class="header-meta" id="updated-time">-</span>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="daily">일별</button>
    <button class="tab-btn"        data-tab="weekly">주간</button>
  </div>
</div>

<div id="pane-daily"  class="tab-pane active"></div>
<div id="pane-weekly" class="tab-pane"></div>

<!-- 모달 -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <div class="modal-poster-wrap" id="modal-poster"></div>
      <div class="modal-title-block">
        <div class="modal-movie-title" id="modal-title"></div>
        <div class="modal-title-en"    id="modal-title-en"></div>
        <div class="modal-badges"      id="modal-badges"></div>
        <div class="modal-bar-wrap"    id="modal-bar"></div>
      </div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div id="modal-synopsis-wrap"></div>
      <div>
        <div class="modal-section-title">영화 정보</div>
        <div class="modal-info-grid" id="modal-info"></div>
      </div>
      <div>
        <div class="modal-section-title">박스오피스</div>
        <div class="modal-stats-row" id="modal-stats"></div>
      </div>
    </div>
  </div>
</div>

<script>
let _allMovies = [];

async function loadData() {
  try {
    const r = await fetch('box_data.json?t=' + Date.now());
    if (!r.ok) throw new Error(r.status);
    return await r.json();
  } catch(e) { return null; }
}

// ── 포맷 ─────────────────────────────────────────────────────────────────────
function fmtAudi(n) {
  const v = Number(n); if (!v) return '-';
  if (v >= 10000000) return (v/10000000).toFixed(1)+'천만명';
  if (v >= 1000000)  return Math.round(v/10000)+'만명';
  if (v >= 10000)    return (v/10000).toFixed(1)+'만명';
  return v.toLocaleString()+'명';
}
function fmtSales(n) {
  const v = Number(n); if (!v) return '-';
  if (v >= 100000000000) return (v/100000000000).toFixed(1)+'천억원';
  if (v >= 10000000000)  return (v/100000000).toFixed(0)+'억원';
  if (v >= 1000000000)   return (v/100000000).toFixed(1)+'억원';
  if (v >= 100000000)    return (v/100000000).toFixed(1)+'억원';
  if (v >= 10000000)     return (v/10000000).toFixed(1)+'천만원';
  return v.toLocaleString()+'원';
}
function fmtDate(s) {
  if (!s || s.length < 8) return s || '-';
  return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
}
function fmtBannerDate(s) {
  if (!s || s.length < 8) return s || '';
  return `${s.slice(0,4)}년 ${parseInt(s.slice(4,6))}월 ${parseInt(s.slice(6,8))}일`;
}

function changeBadge(inten, isNew) {
  if (isNew === 'NEW') return `<span class="mc-change new">NEW</span>`;
  const n = Number(inten);
  if (n > 0)  return `<span class="mc-change up">▲${n}</span>`;
  if (n < 0)  return `<span class="mc-change down">▼${Math.abs(n)}</span>`;
  return `<span class="mc-change same">–</span>`;
}
function rankClass(r) {
  return r==='1'?'r1':r==='2'?'r2':r==='3'?'r3':'rn';
}

// ── 카드 ─────────────────────────────────────────────────────────────────────
function movieCardHTML(m, maxShare, idx) {
  const rank  = m.rank || m.rnum;
  const share = parseFloat(m.salesShare) || 0;
  const barPct = maxShare > 0 ? (share / maxShare * 100).toFixed(1) : 0;
  const rc    = rankClass(rank);
  const isTop = ['1','2','3'].includes(rank);

  const posterHTML = m.poster_url
    ? `<img src="${m.poster_url}" alt="${m.movieNm}" loading="lazy"
           onerror="this.parentElement.innerHTML='<div class=mc-poster-placeholder><span>🎬</span>이미지없음</div>'">`
    : `<div class="mc-poster-placeholder"><span>🎬</span>이미지없음</div>`;

  return `
  <div class="movie-card ${isTop?'rank-top':''}" onclick="openModal(${idx})">
    <div class="mc-poster">
      ${posterHTML}
      <div class="mc-rank-overlay ${rc}">${rank}</div>
    </div>
    <div class="mc-info">
      <div class="mc-title-row">
        <span class="mc-title" title="${m.movieNm}">${m.movieNm}</span>
        ${changeBadge(m.rankInten, m.rankOldAndNew)}
      </div>
      <div>
        <div class="mc-bar-bg"><div class="mc-bar-fill" style="width:${barPct}%"></div></div>
        <div class="mc-bar-label">매출 점유율 ${share}%</div>
      </div>
      <div class="mc-stats">
        <div class="mc-stat">
          <span class="mc-stat-val accent">${fmtAudi(m.audiCnt)}</span>
          <span class="mc-stat-lbl">오늘 관객</span>
        </div>
        <div class="mc-stat">
          <span class="mc-stat-val">${fmtAudi(m.audiAcc)}</span>
          <span class="mc-stat-lbl">누적 관객</span>
        </div>
        <div class="mc-stat">
          <span class="mc-stat-val">${fmtSales(m.salesAmt)}</span>
          <span class="mc-stat-lbl">오늘 매출</span>
        </div>
        <div class="mc-stat">
          <span class="mc-stat-val gold">${fmtSales(m.salesAcc)}</span>
          <span class="mc-stat-lbl">누적 매출</span>
        </div>
      </div>
      <div class="mc-meta">
        <div class="mc-meta-row">개봉 <span class="val">${fmtDate(m.openDt)}</span></div>
        <div class="mc-meta-row">
          🎦 <span class="val">${Number(m.scrnCnt).toLocaleString()}스크린</span>
          &nbsp;▶ <span class="val">${Number(m.showCnt).toLocaleString()}회</span>
        </div>
      </div>
    </div>
  </div>`;
}

// ── 모달 ─────────────────────────────────────────────────────────────────────
function openModal(idx) {
  const m = _allMovies[idx]; if (!m) return;
  const rank = m.rank || m.rnum;
  const rc   = rankClass(rank);
  const share = parseFloat(m.salesShare) || 0;

  // 포스터
  document.getElementById('modal-poster').innerHTML =
    (m.poster_url
      ? `<img src="${m.poster_url}" alt="${m.movieNm}"
             onerror="this.parentElement.innerHTML='<div class=modal-poster-ph><span>🎬</span>이미지없음</div>'">`
      : `<div class="modal-poster-ph"><span>🎬</span>이미지없음</div>`)
    + `<div class="mc-rank-overlay ${rc}">${rank}</div>`;

  // 제목
  document.getElementById('modal-title').textContent = m.movieNm;
  const enTitle = m.movieNmEn || '';
  document.getElementById('modal-title-en').textContent = enTitle;
  document.getElementById('modal-title-en').style.display = enTitle ? '' : 'none';

  // 배지 (장르, 등급, 런타임)
  const badges = [];
  (m.genres || []).forEach(g => badges.push(g));
  if (m.rating)  badges.push(m.rating);
  if (m.runtime) badges.push(m.runtime + '분');
  (m.nations || []).forEach(n => badges.push(n));
  document.getElementById('modal-badges').innerHTML =
    badges.map(b => `<span class="modal-badge">${b}</span>`).join('');

  // 점유율 바
  document.getElementById('modal-bar').innerHTML = `
    <div class="modal-bar-label">
      <span>매출 점유율</span><strong style="color:var(--text)">${share}%</strong>
    </div>
    <div class="modal-bar-bg"><div class="modal-bar-fill" style="width:${share}%"></div></div>`;

  // 줄거리
  const synWrap = document.getElementById('modal-synopsis-wrap');
  if (m.synopsis) {
    synWrap.innerHTML = `
      <div>
        <div class="modal-section-title">줄거리</div>
        <div class="modal-synopsis">${m.synopsis}</div>
      </div>`;
  } else {
    synWrap.innerHTML = '';
  }

  // 영화 정보 그리드
  const dirs   = (m.directors || []).join(', ') || '-';
  const actors = (m.actors    || []).join(', ') || '-';
  const genres = (m.genres    || []).join(' · ') || '-';
  document.getElementById('modal-info').innerHTML = `
    <div class="modal-info-item" style="grid-column:1/-1">
      <div class="modal-info-lbl">출연</div>
      <div class="modal-info-val">${actors}</div>
    </div>
    <div class="modal-info-item">
      <div class="modal-info-lbl">감독</div>
      <div class="modal-info-val">${dirs}</div>
    </div>
    <div class="modal-info-item">
      <div class="modal-info-lbl">개봉일</div>
      <div class="modal-info-val accent">${fmtDate(m.openDt)}</div>
    </div>
    <div class="modal-info-item">
      <div class="modal-info-lbl">장르</div>
      <div class="modal-info-val">${genres}</div>
    </div>
    <div class="modal-info-item">
      <div class="modal-info-lbl">등급 / 러닝타임</div>
      <div class="modal-info-val">${m.rating||'-'} / ${m.runtime?m.runtime+'분':'-'}</div>
    </div>`;

  // 박스오피스 수치
  document.getElementById('modal-stats').innerHTML = `
    <div class="modal-mini-stat">
      <div class="modal-mini-val accent">${fmtAudi(m.audiCnt)}</div>
      <div class="modal-mini-lbl">오늘 관객</div>
    </div>
    <div class="modal-mini-stat">
      <div class="modal-mini-val">${fmtAudi(m.audiAcc)}</div>
      <div class="modal-mini-lbl">누적 관객</div>
    </div>
    <div class="modal-mini-stat">
      <div class="modal-mini-val">${fmtSales(m.salesAmt)}</div>
      <div class="modal-mini-lbl">오늘 매출</div>
    </div>
    <div class="modal-mini-stat">
      <div class="modal-mini-val gold">${fmtSales(m.salesAcc)}</div>
      <div class="modal-mini-lbl">누적 매출</div>
    </div>`;

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── SEO ───────────────────────────────────────────────────────────────────────
function injectSEO(data) {
  const now = new Date();
  const titles = [...(data.daily||[]),...(data.weekly||[])].map(m=>m.movieNm).filter((v,i,a)=>a.indexOf(v)===i);
  const kws = [
    `${now.getMonth()+1}월 ${now.getDate()}일 박스오피스`,
    '오늘 박스오피스 순위','일별 박스오피스 TOP10','주간 박스오피스 TOP10',
    '현재 상영 영화','박스오피스 1위','한국 영화 순위','오늘 영화 추천',
    ...titles.map(t=>`${t} 관객수`), ...titles.map(t=>`${t} 줄거리`),
    ...(data.daily||[]).slice(0,3).map(m=>`${m.movieNm} ${m.rank}위 박스오피스`),
  ];
  document.getElementById('seo-keywords').textContent = kws.join(', ');
}

// ── 렌더 ─────────────────────────────────────────────────────────────────────
function renderMovies(movies, paneId, dateStr, offset) {
  const pane = document.getElementById(paneId);
  if (!movies || !movies.length) { pane.innerHTML = '<div class="msg">데이터가 없습니다.</div>'; return; }
  const maxShare = Math.max(...movies.map(m => parseFloat(m.salesShare)||0));
  const banner = `<div class="date-banner"><strong>${fmtBannerDate(dateStr)}</strong> 기준 박스오피스</div>`;
  const cards  = movies.map((m,i) => movieCardHTML(m, maxShare, offset+i)).join('');
  pane.innerHTML = banner + `<div class="movies-grid">${cards}</div>`;
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('pane-'+btn.dataset.tab).classList.add('active');
  });
});

async function init() {
  const data = await loadData();
  if (!data) {
    document.getElementById('pane-daily').innerHTML =
      '<div class="msg">box_data.json 없음 — python box_fetch.py 실행 필요</div>';
    return;
  }
  if (data.updated) {
    const d = new Date(data.updated);
    document.getElementById('updated-time').textContent =
      `업데이트 ${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }
  _allMovies = [...(data.daily||[]), ...(data.weekly||[])];
  renderMovies(data.daily,  'pane-daily',  data.daily_date,  0);
  renderMovies(data.weekly, 'pane-weekly', data.weekly_date, (data.daily||[]).length);
  injectSEO(data);
}
init();
</script>
