<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>박스오피스 순위</title>
<style>
  :root {
    --bg:      #0d1117;
    --card:    #161b22;
    --border:  #21262d;
    --text:    #e6edf3;
    --sub:     #8b949e;
    --muted:   #484f58;
    --accent:  #58a6ff;
    --gold:    #ffd700;
    --silver:  #c0c0c0;
    --bronze:  #cd7f32;
    --green:   #3fb950;
    --red:     #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Malgun Gothic', sans-serif; }

  /* ── 헤더 ── */
  .header {
    background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 0;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .header-title { display: flex; align-items: center; gap: 10px; }
  .header-title h1 { font-size: 1.2rem; font-weight: 700; }
  .header-title .icon { font-size: 1.4rem; }
  .header-meta { font-size: 0.72rem; color: var(--muted); }

  /* ── 탭 ── */
  .tabs { display: flex; gap: 0; }
  .tab-btn {
    padding: 8px 20px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--sub);
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: color .15s, border-color .15s;
  }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }

  /* ── 날짜 배너 ── */
  .date-banner {
    padding: 10px 16px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    font-size: 0.78rem;
    color: var(--sub);
  }
  .date-banner strong { color: var(--text); }

  /* ── 탭 패널 ── */
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* ── 영화 카드 그리드 ── */
  .movies-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 10px;
    padding: 14px;
  }

  /* ── 영화 카드 ── */
  .movie-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color .15s;
  }
  .movie-card:hover { border-color: #30363d; }
  .movie-card.rank-top { border-color: #2a2118; }

  .mc-inner { display: flex; gap: 0; padding: 14px; align-items: flex-start; }

  /* ── 순위 배지 ── */
  .mc-rank {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    font-weight: 900;
    margin-right: 12px;
  }
  .mc-rank.r1 { background: linear-gradient(135deg, #4a3900, #2a2000); color: var(--gold); border: 1px solid #5a4a10; }
  .mc-rank.r2 { background: linear-gradient(135deg, #2a2f35, #1a2025); color: var(--silver); border: 1px solid #3a4550; }
  .mc-rank.r3 { background: linear-gradient(135deg, #3a2010, #220e05); color: var(--bronze); border: 1px solid #5a3020; }
  .mc-rank.rn  { background: #1c2128; color: var(--sub); border: 1px solid var(--border); font-size: 1.05rem; }

  /* ── 영화 정보 ── */
  .mc-info { flex: 1; min-width: 0; }
  .mc-title-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
  .mc-title { font-size: 0.97rem; font-weight: 700; color: var(--text); line-height: 1.3; }
  .mc-change {
    display: inline-flex; align-items: center;
    font-size: 0.68rem; font-weight: 700;
    padding: 1px 5px; border-radius: 4px;
    white-space: nowrap; flex-shrink: 0;
  }
  .mc-change.up   { background: #1a3320; color: var(--green); }
  .mc-change.down { background: #2d1414; color: var(--red); }
  .mc-change.same { background: #1c2128; color: var(--muted); }
  .mc-change.new  { background: #0d2a4a; color: var(--accent); }

  /* ── 점유율 바 ── */
  .mc-bar-wrap { margin-bottom: 8px; }
  .mc-bar-bg { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .mc-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), #1f6feb); transition: width .4s; }
  .mc-bar-label { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }

  /* ── 관객 수치 ── */
  .mc-nums { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 6px; }
  .mc-num { display: flex; flex-direction: column; }
  .mc-num-val { font-size: 0.88rem; font-weight: 700; color: var(--text); }
  .mc-num-val.big { color: var(--accent); }
  .mc-num-lbl { font-size: 0.63rem; color: var(--muted); margin-top: 1px; }

  /* ── 하단 메타 ── */
  .mc-meta { display: flex; gap: 10px; font-size: 0.68rem; color: var(--muted); flex-wrap: wrap; }
  .mc-meta span::before { content: ''; }

  /* ── 로딩/에러 ── */
  .msg { padding: 40px; text-align: center; color: var(--muted); font-size: 0.9rem; }

  /* ── 반응형 ── */
  @media (max-width: 480px) {
    .movies-grid { grid-template-columns: 1fr; padding: 10px; gap: 8px; }
    .mc-title { font-size: 0.9rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-title">
      <span class="icon">🎬</span>
      <h1>박스오피스</h1>
    </div>
    <span class="header-meta" id="updated-time">-</span>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="daily">일별</button>
    <button class="tab-btn"        data-tab="weekly">주간</button>
  </div>
</div>

<div id="pane-daily"  class="tab-pane active"></div>
<div id="pane-weekly" class="tab-pane"></div>

<script>
// ── 데이터 로드 ──────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const r = await fetch('box_data.json?t=' + Date.now());
    if (!r.ok) throw new Error(r.status);
    return await r.json();
  } catch(e) {
    return null;
  }
}

// ── 숫자 포맷 ────────────────────────────────────────────────────────────────
function fmtAudi(n) {
  const v = Number(n);
  if (!v) return '-';
  if (v >= 10000000) return (v / 10000000).toFixed(1) + '천만';
  if (v >= 1000000)  return (v / 10000).toFixed(0) + '만';
  if (v >= 10000)    return (v / 10000).toFixed(1) + '만';
  return v.toLocaleString();
}
function fmtSales(n) {
  const v = Number(n);
  if (!v) return '-';
  if (v >= 100000000) return (v / 100000000).toFixed(1) + '억';
  if (v >= 10000000)  return (v / 10000000).toFixed(1) + '천만';
  if (v >= 1000000)   return (v / 1000000).toFixed(0) + '백만';
  return v.toLocaleString() + '원';
}
function fmtDate(s) {
  // "20260430" → "2026.04.30"
  if (!s || s.length < 8) return s || '-';
  return `${s.slice(0,4)}.${s.slice(4,6)}.${s.slice(6,8)}`;
}

// ── 순위 변동 배지 ───────────────────────────────────────────────────────────
function changeBadge(inten, isNew) {
  if (isNew === 'NEW') return `<span class="mc-change new">NEW</span>`;
  const n = Number(inten);
  if (n > 0)  return `<span class="mc-change up">▲${n}</span>`;
  if (n < 0)  return `<span class="mc-change down">▼${Math.abs(n)}</span>`;
  return `<span class="mc-change same">–</span>`;
}

// ── 순위 배지 클래스 ─────────────────────────────────────────────────────────
function rankClass(r) {
  if (r === '1') return 'r1';
  if (r === '2') return 'r2';
  if (r === '3') return 'r3';
  return 'rn';
}

// ── 영화 카드 HTML ───────────────────────────────────────────────────────────
function movieCardHTML(m, maxShare) {
  const rank    = m.rank || m.rnum;
  const share   = parseFloat(m.salesShare) || 0;
  const barPct  = maxShare > 0 ? (share / maxShare * 100).toFixed(1) : 0;
  const isTop   = ['1','2','3'].includes(rank);

  return `
  <div class="movie-card ${isTop ? 'rank-top' : ''}">
    <div class="mc-inner">
      <div class="mc-rank ${rankClass(rank)}">${rank}</div>
      <div class="mc-info">
        <div class="mc-title-row">
          <span class="mc-title">${m.movieNm}</span>
          ${changeBadge(m.rankInten, m.rankOldAndNew)}
        </div>
        <div class="mc-bar-wrap">
          <div class="mc-bar-bg"><div class="mc-bar-fill" style="width:${barPct}%"></div></div>
          <div class="mc-bar-label">매출 점유율 ${share}%</div>
        </div>
        <div class="mc-nums">
          <div class="mc-num">
            <span class="mc-num-val big">${fmtAudi(m.audiCnt)}명</span>
            <span class="mc-num-lbl">오늘 관객</span>
          </div>
          <div class="mc-num">
            <span class="mc-num-val">${fmtAudi(m.audiAcc)}명</span>
            <span class="mc-num-lbl">누적 관객</span>
          </div>
          <div class="mc-num">
            <span class="mc-num-val">${fmtSales(m.salesAmt)}</span>
            <span class="mc-num-lbl">오늘 매출</span>
          </div>
        </div>
        <div class="mc-meta">
          <span>📅 개봉 ${fmtDate(m.openDt)}</span>
          <span>🎦 스크린 ${Number(m.scrnCnt).toLocaleString()}</span>
          <span>▶ 상영 ${Number(m.showCnt).toLocaleString()}</span>
        </div>
      </div>
    </div>
  </div>`;
}

// ── 날짜 포맷 (YYYYMMDD → M월 D일) ──────────────────────────────────────────
function fmtBannerDate(s) {
  if (!s || s.length < 8) return s || '';
  const y = s.slice(0,4), mo = s.slice(4,6), d = s.slice(6,8);
  return `${y}년 ${parseInt(mo)}월 ${parseInt(d)}일`;
}

// ── 렌더 ─────────────────────────────────────────────────────────────────────
function renderMovies(movies, paneId, dateStr) {
  const pane = document.getElementById(paneId);
  if (!movies || movies.length === 0) {
    pane.innerHTML = '<div class="msg">데이터가 없습니다.</div>';
    return;
  }
  const maxShare = Math.max(...movies.map(m => parseFloat(m.salesShare) || 0));
  const banner = `<div class="date-banner"><strong>${fmtBannerDate(dateStr)}</strong> 기준 박스오피스</div>`;
  const cards  = movies.map(m => movieCardHTML(m, maxShare)).join('');
  pane.innerHTML = banner + `<div class="movies-grid">${cards}</div>`;
}

// ── 탭 전환 ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('pane-' + btn.dataset.tab).classList.add('active');
  });
});

// ── 초기화 ───────────────────────────────────────────────────────────────────
async function init() {
  const data = await loadData();
  if (!data) {
    document.getElementById('pane-daily').innerHTML  = '<div class="msg">box_data.json 을 찾을 수 없습니다.<br>python box_fetch.py 를 먼저 실행하세요.</div>';
    document.getElementById('pane-weekly').innerHTML = '<div class="msg">데이터 없음</div>';
    return;
  }

  // 업데이트 시간
  if (data.updated) {
    const d = new Date(data.updated);
    document.getElementById('updated-time').textContent =
      `업데이트 ${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  renderMovies(data.daily,  'pane-daily',  data.daily_date);
  renderMovies(data.weekly, 'pane-weekly', data.weekly_date);
}

init();
</script>
</body>
</html>
